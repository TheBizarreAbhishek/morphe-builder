name: Sync Upstream

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync Upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote add upstream https://github.com/j-hc/revanced-magisk-module.git || true
          git fetch upstream main
          
          # Attempt merge, if it fails due to conflicts, resolve them preferring ours
          if ! git merge FETCH_HEAD -m "Sync upstream changes" --allow-unrelated-histories -X ours; then
            echo "Merge conflicts detected, resolving using --ours..."
            git checkout --ours .
            git add -A
            git commit -m "Sync upstream changes (resolved conflicts preferring ours)"
          fi
          
          git push origin main
