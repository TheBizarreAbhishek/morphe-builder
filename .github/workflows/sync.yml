name: Sync Upstream

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync Upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git remote add upstream https://github.com/j-hc/revanced-magisk-module.git || true
          git fetch upstream main
          
          # Merge upstream/main with ours strategy for conflicts to preserve our customized files
          if ! git merge upstream/main -m "Sync upstream changes" --allow-unrelated-histories -X ours; then
            echo "::warning::Merge had conflicts that could not be resolved automatically."
            exit 1
          fi
          
          git push origin main
